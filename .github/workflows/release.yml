name: release

on:
  push:
    branches:
      - release
      - development
    tags:
      - v*
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  IMAGE_NAME: docker.io/twgbellok/neurodivergent-memory
  GHCR_IMAGE_NAME: ghcr.io/jmeyer1980/neurodivergent-memory
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AZDO_MARKETPLACE_PUBLISHER_ID: jmeyer-twg
  AZDO_MARKETPLACE_SERVICE_URL: https://marketplace.visualstudio.com
  AZDO_EXTENSION_MANIFEST_GLOBS: vss-extension.json

jobs:
  sync_release_with_main:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync release branch to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main release

          # Guardrail: only sync if the tag commit exists on main.
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is not on main; skipping release branch sync."
            exit 0
          fi

          git checkout -B release origin/release
          git reset --hard origin/main
          git push origin release --force-with-lease

  ci:
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.GHCR_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: twgbellok/neurodivergent-memory
          readme-filepath: ./README.md

      - name: Attest container image
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  rc_release:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Compute RC version and tag names
        id: rc_meta
        run: |
          base_version="$(node -p "require('./package.json').version")"
          run_sequence="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          rc_version="${base_version}-rc.${run_sequence}"
          release_tag="rc-${rc_version}"

          npm version "$rc_version" --no-git-tag-version

          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "run_sequence=$run_sequence" >> "$GITHUB_OUTPUT"
          echo "rc_version=$rc_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: npm run build

      - name: Pack npm artifact
        id: pack
        run: |
          tarball="$(npm pack | tail -n 1)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball" > checksums.txt

      - name: Attest npm package tarball
        id: package_attest
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Publish RC package to npm
        run: |
          pkg_name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          if npm view "${pkg_name}@${version}" version >/dev/null 2>&1; then
            echo "${pkg_name}@${version} already exists on npm; skipping publish."
            exit 0
          fi

          set +e
          publish_log="$(mktemp)"
          npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public --tag rc 2> >(tee "$publish_log" >&2)
          status=$?
          set -e

          if [ "$status" -ne 0 ] && grep -q "EOTP" "$publish_log"; then
            echo "::error::npm publish failed with EOTP (2FA challenge). Use an npm Automation token for NPM_TOKEN (recommended), or configure npm Trusted Publishing for this repo."
          fi

          exit "$status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.GHCR_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.rc_meta.outputs.release_tag }}

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: twgbellok/neurodivergent-memory
          readme-filepath: ./README.md

      - name: Attest container image
        id: image_attest
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Collect attestation bundles
        run: |
          cp "${{ steps.package_attest.outputs.bundle-path }}" npm-package.attestation.json
          cp "${{ steps.image_attest.outputs.bundle-path }}" docker-image.attestation.json

      - name: Create RC release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Release Candidate

          This is an automated development branch release candidate and may be unstable.

          - Branch: development
          - Base version: ${{ steps.rc_meta.outputs.base_version }}
          - Run sequence: ${{ steps.rc_meta.outputs.run_sequence }} (run_number.run_attempt)
          - RC version: ${{ steps.rc_meta.outputs.rc_version }}
          - npm install: npm install neurodivergent-memory@${{ steps.rc_meta.outputs.rc_version }}
          - npm dist-tag: rc
          - Docker tags:
            - ${{ steps.rc_meta.outputs.release_tag }}

          Use with caution for validation and early integration testing only.
          EOF

      - name: Create or update RC GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.rc_meta.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.rc_meta.outputs.release_tag }}" \
              "${{ steps.pack.outputs.tarball }}" \
              checksums.txt \
              npm-package.attestation.json \
              docker-image.attestation.json \
              --clobber
            gh release edit "${{ steps.rc_meta.outputs.release_tag }}" --prerelease --notes-file release-notes.md
          else
            gh release create "${{ steps.rc_meta.outputs.release_tag }}" \
              "${{ steps.pack.outputs.tarball }}" \
              checksums.txt \
              npm-package.attestation.json \
              docker-image.attestation.json \
              --prerelease \
              --notes-file release-notes.md
          fi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release version matches tag
        run: |
          package_version="v$(node -p "require('./package.json').version")"
          if [ "$package_version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Package Azure DevOps extension VSIX
        id: package_vsix
        run: |
          manifest_globs="${AZDO_EXTENSION_MANIFEST_GLOBS:-vss-extension.json}"

          if ! compgen -G "$manifest_globs" > /dev/null; then
            echo "No extension manifest matched '$manifest_globs'; skipping VSIX packaging."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node -e "const fs=require('node:fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const manifestPath='vss-extension.json';const manifest=JSON.parse(fs.readFileSync(manifestPath,'utf8'));manifest.version=pkg.version;manifest.publisher=process.env.AZDO_MARKETPLACE_PUBLISHER_ID||manifest.publisher;fs.writeFileSync(manifestPath,JSON.stringify(manifest,null,2)+'\\n');if(process.env.GITHUB_OUTPUT){fs.appendFileSync(process.env.GITHUB_OUTPUT,`extension_id=${manifest.id}\\n`);fs.appendFileSync(process.env.GITHUB_OUTPUT,`publisher=${manifest.publisher}\\n`);}"

          npm exec --yes -- tfx-cli extension create --manifest-globs "$manifest_globs" --output-path .

          vsix_path="$(ls -1 *.vsix | head -n 1)"
          if [ -z "$vsix_path" ]; then
            echo "VSIX packaging ran but no .vsix artifact was produced."
            exit 1
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=$vsix_path" >> "$GITHUB_OUTPUT"

      - name: Publish extension to Visual Studio Marketplace
        if: steps.package_vsix.outputs.found == 'true'
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets['AZURE_DEVOPS_MARKETPLACE_TOKEN'] }}
        run: |
          if [ -z "$AZURE_DEVOPS_EXT_PAT" ]; then
            echo "AZURE_DEVOPS_MARKETPLACE_TOKEN is not configured; skipping Marketplace publish."
            exit 0
          fi

          npm exec --yes -- tfx-cli extension publish \
            --auth-type pat \
            --publisher "${{ steps.package_vsix.outputs.publisher }}" \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --service-url "${{ env.AZDO_MARKETPLACE_SERVICE_URL }}" \
            --vsix "${{ steps.package_vsix.outputs.path }}" \
            --no-wait-validation \
            --no-prompt

      - name: Pack npm artifact
        id: pack
        run: |
          tarball="$(npm pack | tail -n 1)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball" > checksums.txt

      - name: Attest npm package tarball
        id: package_attest
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Publish package to npm
        run: |
          version="$(node -p "require('./package.json').version")"

          if npm view "neurodivergent-memory@$version" version >/dev/null 2>&1; then
            echo "neurodivergent-memory@$version already exists on npm; skipping publish."
            exit 0
          fi

          set +e
          publish_log="$(mktemp)"
          npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public 2> >(tee "$publish_log" >&2)
          status=$?
          set -e

          if [ "$status" -ne 0 ] && grep -q "EOTP" "$publish_log"; then
            echo "::error::npm publish failed with EOTP (2FA challenge). Use an npm Automation token for NPM_TOKEN (recommended), or configure npm Trusted Publishing for this repo."
          fi

          exit "$status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.GHCR_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Attest container image
        id: image_attest
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Collect attestation bundles
        run: |
          cp "${{ steps.package_attest.outputs.bundle-path }}" npm-package.attestation.json
          cp "${{ steps.image_attest.outputs.bundle-path }}" docker-image.attestation.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            "${{ steps.pack.outputs.tarball }}"
            checksums.txt
            npm-package.attestation.json
            docker-image.attestation.json
          )

          if [ "${{ steps.package_vsix.outputs.found }}" = "true" ]; then
            assets+=("${{ steps.package_vsix.outputs.path }}")
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "${assets[@]}" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "${assets[@]}" \
              --generate-notes
          fi
