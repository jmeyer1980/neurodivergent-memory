name: release

on:
  push:
    branches:
      - release
      - development
    tags:
      - v*
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  IMAGE_NAME: docker.io/twgbellok/neurodivergent-memory
  GHCR_IMAGE_NAME: ghcr.io/jmeyer1980/neurodivergent-memory
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AZDO_MARKETPLACE_PUBLISHER_ID: jmeyer-twg
  AZDO_MARKETPLACE_SERVICE_URL: https://marketplace.visualstudio.com
  AZDO_EXTENSION_MANIFEST_GLOBS: vss-extension.json
  VSCODE_EXTENSION_PACKAGE_PATH: neurodivergent-memory-vscode.vsix
  VSIDE_EXTENSION_VSIX_GLOBS: visualstudio-extension/*.vsix

jobs:
  sync_release_with_main:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync release branch to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main release

          # Guardrail: only sync if the tag commit exists on main.
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is not on main; skipping release branch sync."
            exit 0
          fi

          git checkout -B release origin/release
          git reset --hard origin/main
          git push origin release --force-with-lease

  ci:
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Validate VS Code extension VSIX packaging (RC gate)
        run: |
          npm run package:vscode
          if [ ! -f "${VSCODE_EXTENSION_PACKAGE_PATH}" ]; then
            echo "VS Code extension packaging did not produce ${VSCODE_EXTENSION_PACKAGE_PATH}."
            exit 1
          fi
          echo "RC gate produced VS Code VSIX: ${VSCODE_EXTENSION_PACKAGE_PATH}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.GHCR_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: twgbellok/neurodivergent-memory
          readme-filepath: ./README.md

      - name: Attest container image
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  rc_release:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Compute RC version and tag names
        id: rc_meta
        run: |
          base_version="$(node -p "require('./package.json').version")"
          run_sequence="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          rc_version="${base_version}-rc.${run_sequence}"
          release_tag="rc-${rc_version}"

          npm version "$rc_version" --no-git-tag-version

          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "run_sequence=$run_sequence" >> "$GITHUB_OUTPUT"
          echo "rc_version=$rc_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Validate Azure DevOps extension manifest (RC gate)
        id: validate_azdo_manifest_rc
        run: |
          manifest_globs="${AZDO_EXTENSION_MANIFEST_GLOBS:-vss-extension.json}"

          if ! compgen -G "$manifest_globs" > /dev/null; then
            echo "No extension manifest matched '$manifest_globs'; skipping RC Marketplace validation."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const manifestPath = 'vss-extension.json';
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          manifest.version = pkg.version;
          manifest.publisher = process.env.AZDO_MARKETPLACE_PUBLISHER_ID || manifest.publisher;

          const allowedCategories = new Set([
            'Azure Repos',
            'Azure Boards',
            'Azure Pipelines',
            'Azure Test Plans',
            'Azure Artifacts'
          ]);

          const errors = [];

          if (!Array.isArray(manifest.categories) || manifest.categories.length === 0) {
            errors.push('Manifest must include at least one category.');
          } else {
            for (const category of manifest.categories) {
              if (!allowedCategories.has(category)) {
                errors.push(`Unsupported category '${category}'. Allowed: ${Array.from(allowedCategories).join(', ')}`);
              }
            }
          }

          const iconRelativePath = manifest.icons && manifest.icons.default;
          if (!iconRelativePath) {
            errors.push('Manifest must define icons.default for Marketplace publication.');
          } else {
            const iconAbsolutePath = path.resolve(iconRelativePath);
            if (!fs.existsSync(iconAbsolutePath)) {
              errors.push(`icons.default file not found: ${iconRelativePath}`);
            } else {
              if (path.extname(iconRelativePath).toLowerCase() !== '.png') {
                errors.push('icons.default should be a PNG file for predictable validation.');
              } else {
                const buffer = fs.readFileSync(iconAbsolutePath);
                const isPng = buffer.length >= 24 && buffer[0] === 0x89 && buffer.toString('ascii', 1, 4) === 'PNG';
                if (!isPng) {
                  errors.push(`icons.default is not a valid PNG: ${iconRelativePath}`);
                } else {
                  const width = buffer.readUInt32BE(16);
                  const height = buffer.readUInt32BE(20);
                  if (width < 128 || height < 128) {
                    errors.push(`icons.default must be at least 128x128. Found ${width}x${height}.`);
                  }
                }
              }
            }
          }

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);

          if (errors.length > 0) {
            for (const error of errors) {
              console.error(`::error::${error}`);
            }
            process.exit(1);
          }

          console.log('Azure DevOps extension manifest validation passed.');
          NODE

      - name: Build package
        run: npm run build

      - name: Validate Azure DevOps extension VSIX packaging (RC gate)
        if: steps.validate_azdo_manifest_rc.outputs.found == 'true'
        run: |
          npm exec --yes -- tfx-cli extension create --manifest-globs "${AZDO_EXTENSION_MANIFEST_GLOBS:-vss-extension.json}" --output-path .
          vsix_path="$(ls -1 *.vsix | head -n 1)"
          if [ -z "$vsix_path" ]; then
            echo "VSIX validation packaging did not produce an artifact."
            exit 1
          fi
          echo "RC gate produced VSIX: $vsix_path"

      - name: Pack npm artifact
        id: pack
        run: |
          tarball="$(npm pack | tail -n 1)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball" > checksums.txt

      - name: Attest npm package tarball
        id: package_attest
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Publish RC package to npm
        run: |
          pkg_name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          if npm view "${pkg_name}@${version}" version >/dev/null 2>&1; then
            echo "${pkg_name}@${version} already exists on npm; skipping publish."
            exit 0
          fi

          set +e
          publish_log="$(mktemp)"
          npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public --tag rc 2> >(tee "$publish_log" >&2)
          status=$?
          set -e

          if [ "$status" -ne 0 ] && grep -q "EOTP" "$publish_log"; then
            echo "::error::npm publish failed with EOTP (2FA challenge). Use an npm Automation token for NPM_TOKEN (recommended), or configure npm Trusted Publishing for this repo."
          fi

          exit "$status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.GHCR_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.rc_meta.outputs.release_tag }}

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: twgbellok/neurodivergent-memory
          readme-filepath: ./README.md

      - name: Attest container image
        id: image_attest
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Collect attestation bundles
        run: |
          cp "${{ steps.package_attest.outputs.bundle-path }}" npm-package.attestation.json
          cp "${{ steps.image_attest.outputs.bundle-path }}" docker-image.attestation.json

      - name: Create RC release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Release Candidate

          This is an automated development branch release candidate and may be unstable.

          - Branch: development
          - Base version: ${{ steps.rc_meta.outputs.base_version }}
          - Run sequence: ${{ steps.rc_meta.outputs.run_sequence }} (run_number.run_attempt)
          - RC version: ${{ steps.rc_meta.outputs.rc_version }}
          - npm install: npm install neurodivergent-memory@${{ steps.rc_meta.outputs.rc_version }}
          - npm dist-tag: rc
          - Docker tags:
            - ${{ steps.rc_meta.outputs.release_tag }}

          Use with caution for validation and early integration testing only.
          EOF

      - name: Create or update RC GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.rc_meta.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.rc_meta.outputs.release_tag }}" \
              "${{ steps.pack.outputs.tarball }}" \
              checksums.txt \
              npm-package.attestation.json \
              docker-image.attestation.json \
              --clobber
            gh release edit "${{ steps.rc_meta.outputs.release_tag }}" --prerelease --notes-file release-notes.md
          else
            gh release create "${{ steps.rc_meta.outputs.release_tag }}" \
              "${{ steps.pack.outputs.tarball }}" \
              checksums.txt \
              npm-package.attestation.json \
              docker-image.attestation.json \
              --prerelease \
              --notes-file release-notes.md
          fi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release version matches tag
        run: |
          package_version="v$(node -p "require('./package.json').version")"
          if [ "$package_version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Validate Azure DevOps extension manifest
        id: validate_azdo_manifest_release
        run: |
          manifest_globs="${AZDO_EXTENSION_MANIFEST_GLOBS:-vss-extension.json}"

          if ! compgen -G "$manifest_globs" > /dev/null; then
            echo "No extension manifest matched '$manifest_globs'; skipping manifest validation."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const manifestPath = 'vss-extension.json';
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          manifest.version = pkg.version;
          manifest.publisher = process.env.AZDO_MARKETPLACE_PUBLISHER_ID || manifest.publisher;

          const allowedCategories = new Set([
            'Azure Repos',
            'Azure Boards',
            'Azure Pipelines',
            'Azure Test Plans',
            'Azure Artifacts'
          ]);

          const errors = [];

          if (!Array.isArray(manifest.categories) || manifest.categories.length === 0) {
            errors.push('Manifest must include at least one category.');
          } else {
            for (const category of manifest.categories) {
              if (!allowedCategories.has(category)) {
                errors.push(`Unsupported category '${category}'. Allowed: ${Array.from(allowedCategories).join(', ')}`);
              }
            }
          }

          const iconRelativePath = manifest.icons && manifest.icons.default;
          if (!iconRelativePath) {
            errors.push('Manifest must define icons.default for Marketplace publication.');
          } else {
            const iconAbsolutePath = path.resolve(iconRelativePath);
            if (!fs.existsSync(iconAbsolutePath)) {
              errors.push(`icons.default file not found: ${iconRelativePath}`);
            } else {
              if (path.extname(iconRelativePath).toLowerCase() !== '.png') {
                errors.push('icons.default should be a PNG file for predictable validation.');
              } else {
                const buffer = fs.readFileSync(iconAbsolutePath);
                const isPng = buffer.length >= 24 && buffer[0] === 0x89 && buffer.toString('ascii', 1, 4) === 'PNG';
                if (!isPng) {
                  errors.push(`icons.default is not a valid PNG: ${iconRelativePath}`);
                } else {
                  const width = buffer.readUInt32BE(16);
                  const height = buffer.readUInt32BE(20);
                  if (width < 128 || height < 128) {
                    errors.push(`icons.default must be at least 128x128. Found ${width}x${height}.`);
                  }
                }
              }
            }
          }

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);

          if (errors.length > 0) {
            for (const error of errors) {
              console.error(`::error::${error}`);
            }
            process.exit(1);
          }

          console.log('Azure DevOps extension manifest validation passed.');
          NODE

      - name: Package Azure DevOps extension VSIX
        id: package_vsix
        run: |
          manifest_globs="${AZDO_EXTENSION_MANIFEST_GLOBS:-vss-extension.json}"

          if ! compgen -G "$manifest_globs" > /dev/null; then
            echo "No extension manifest matched '$manifest_globs'; skipping VSIX packaging."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node -e "const fs=require('node:fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const manifestPath='vss-extension.json';const manifest=JSON.parse(fs.readFileSync(manifestPath,'utf8'));manifest.version=pkg.version;manifest.publisher=process.env.AZDO_MARKETPLACE_PUBLISHER_ID||manifest.publisher;fs.writeFileSync(manifestPath,JSON.stringify(manifest,null,2)+'\\n');if(process.env.GITHUB_OUTPUT){fs.appendFileSync(process.env.GITHUB_OUTPUT,'extension_id='+manifest.id+'\\n');fs.appendFileSync(process.env.GITHUB_OUTPUT,'publisher='+manifest.publisher+'\\n');}"

          npm exec --yes -- tfx-cli extension create --manifest-globs "$manifest_globs" --output-path .

          vsix_path="$(ls -1 *.vsix | head -n 1)"
          if [ -z "$vsix_path" ]; then
            echo "VSIX packaging ran but no .vsix artifact was produced."
            exit 1
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=$vsix_path" >> "$GITHUB_OUTPUT"

      - name: Package VS Code extension VSIX
        id: package_vscode_vsix
        run: |
          npm run package:vscode

          if [ ! -f "${VSCODE_EXTENSION_PACKAGE_PATH}" ]; then
            echo "VS Code extension packaging ran but no VSIX artifact was produced."
            exit 1
          fi

          echo "path=${VSCODE_EXTENSION_PACKAGE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Discover Visual Studio IDE extension VSIX (optional)
        id: discover_vside_vsix
        run: |
          vside_globs="${VSIDE_EXTENSION_VSIX_GLOBS:-visualstudio-extension/*.vsix}"

          if ! compgen -G "$vside_globs" > /dev/null; then
            echo "No Visual Studio IDE VSIX matched '$vside_globs'; skipping Visual Studio IDE channel publish path."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          vside_vsix_path="$(ls -1 $vside_globs | head -n 1)"
          if [ -z "$vside_vsix_path" ]; then
            echo "Visual Studio IDE VSIX discovery matched globs but produced no file path."
            exit 1
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=$vside_vsix_path" >> "$GITHUB_OUTPUT"

      - name: Visual Studio IDE channel guidance
        if: steps.discover_vside_vsix.outputs.found == 'true'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ### Visual Studio IDE channel

          A Visual Studio IDE VSIX artifact was discovered and attached to this release. Publication of Visual Studio IDE extensions can be completed from the Marketplace publisher portal under **New extension -> Visual Studio** if fully automated publish is not configured.
          EOF

      - name: Publish extension to Visual Studio Marketplace
        id: publish_azdo_marketplace
        if: steps.package_vsix.outputs.found == 'true'
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets['AZURE_DEVOPS_MARKETPLACE_TOKEN'] }}
        run: |
          if [ -z "$AZURE_DEVOPS_EXT_PAT" ]; then
            echo "AZURE_DEVOPS_MARKETPLACE_TOKEN is not configured; skipping Marketplace publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm exec --yes -- tfx-cli extension publish \
            --auth-type pat \
            --publisher "${{ steps.package_vsix.outputs.publisher }}" \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --service-url "${{ env.AZDO_MARKETPLACE_SERVICE_URL }}" \
            --vsix "${{ steps.package_vsix.outputs.path }}" \
            --no-wait-validation \
            --no-prompt

          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Publish extension to VS Code Marketplace
        id: publish_vscode_marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is not configured; skipping VS Code Marketplace publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm exec --yes -- @vscode/vsce publish --packagePath "${{ steps.package_vscode_vsix.outputs.path }}" -p "$VSCE_PAT"
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Publish extension to Open VSX (optional)
        id: publish_ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT is not configured; skipping Open VSX publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm exec --yes -- ovsx publish "${{ steps.package_vscode_vsix.outputs.path }}" -p "$OVSX_PAT"
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Pack npm artifact
        id: pack
        run: |
          tarball="$(npm pack | tail -n 1)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball" > checksums.txt

      - name: Attest npm package tarball
        id: package_attest
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Publish package to npm
        run: |
          version="$(node -p "require('./package.json').version")"

          if npm view "neurodivergent-memory@$version" version >/dev/null 2>&1; then
            echo "neurodivergent-memory@$version already exists on npm; skipping publish."
            exit 0
          fi

          set +e
          publish_log="$(mktemp)"
          npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public 2> >(tee "$publish_log" >&2)
          status=$?
          set -e

          if [ "$status" -ne 0 ] && grep -q "EOTP" "$publish_log"; then
            echo "::error::npm publish failed with EOTP (2FA challenge). Use an npm Automation token for NPM_TOKEN (recommended), or configure npm Trusted Publishing for this repo."
          fi

          exit "$status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: twgbellok
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.GHCR_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true

      - name: Attest container image
        id: image_attest
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Collect attestation bundles
        run: |
          cp "${{ steps.package_attest.outputs.bundle-path }}" npm-package.attestation.json
          cp "${{ steps.image_attest.outputs.bundle-path }}" docker-image.attestation.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            "${{ steps.pack.outputs.tarball }}"
            checksums.txt
            npm-package.attestation.json
            docker-image.attestation.json
            "${{ steps.package_vscode_vsix.outputs.path }}"
          )

          if [ "${{ steps.package_vsix.outputs.found }}" = "true" ]; then
            assets+=("${{ steps.package_vsix.outputs.path }}")
          fi

          if [ "${{ steps.discover_vside_vsix.outputs.found }}" = "true" ]; then
            assets+=("${{ steps.discover_vside_vsix.outputs.path }}")
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "${assets[@]}" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "${assets[@]}" \
              --generate-notes
          fi

      - name: Marketplace channel summary
        if: always()
        run: |
          azdo_status="skipped"
          vscode_status="skipped"
          ovsx_status="skipped"
          vside_status="not-provided"

          if [ "${{ steps.publish_azdo_marketplace.outputs.published }}" = "true" ]; then
            azdo_status="published"
          fi

          if [ "${{ steps.publish_vscode_marketplace.outputs.published }}" = "true" ]; then
            vscode_status="published"
          fi

          if [ "${{ steps.publish_ovsx.outputs.published }}" = "true" ]; then
            ovsx_status="published"
          fi

          if [ "${{ steps.discover_vside_vsix.outputs.found }}" = "true" ]; then
            vside_status="artifact-attached"
          fi

          {
            echo "### Marketplace Channel Summary"
            echo
            echo "| Channel | Status |"
            echo "| --- | --- |"
            echo "| Azure DevOps / Visual Studio Marketplace (Azure Extension) | ${azdo_status} |"
            echo "| VS Code Marketplace | ${vscode_status} |"
            echo "| Visual Studio IDE Marketplace | ${vside_status} |"
            echo "| Open VSX | ${ovsx_status} |"
          } >> "$GITHUB_STEP_SUMMARY"
